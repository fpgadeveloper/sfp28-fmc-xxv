CONFIG_XILINX_SDFEC=y

# Required by all designs
CONFIG_AMD_PHY=y
CONFIG_XILINX_PHY=y

# Enable the kernel SFP framework so phylink can delegate module-presence
# detection (mod-def0-gpios on each sfp-eth* node) to it. Without this the
# "sfp = <&...>" DT properties are silently ignored and phylink falls back
# to in-band-status — which makes empty cages flap their link state.
# CONFIG_MDIO_I2C is needed for SFP modules whose on-module PHY is reached
# via I2C (1000BASE-X, SGMII copper). Direct-attach 10GBASE-R modules
# don't strictly need it but it's cheap to enable.
CONFIG_SFP=y
CONFIG_MDIO_I2C=y

# 10GBASE-T copper SFP modules (SFP-10G-T) contain a real 10GBASE-T PHY
# chip reached via MDIO-over-I2C through the SFP cage's I2C bus. Without
# a matching PHY driver, phy->supported stays empty and phylink's
# sfp_add_phy validation fails with -EINVAL even though the host-side
# 10gbase-r interface can carry the link. Cover the three chips found in
# essentially all 10G copper SFPs sold today: Marvell Alaska 10G
# (88X3310/88E2110), Aquantia/Marvell AQR (AQR105/107/113/412), and
# Broadcom BCM84881. Plus 88X2222 for the rarer 10G fiber+SFP variants.
CONFIG_MARVELL_10G_PHY=y
CONFIG_AQUANTIA_PHY=y
CONFIG_BCM84881_PHY=y
CONFIG_MARVELL_88X2222_PHY=y
