# This design's system device tree (multiple MRMAC ports + MCDMA + GPIO/I2C)
# produces a u-boot.dtb (~128 KB) that just exceeds u-boot's init-stack/BSS
# headroom check:
#   u-boot.dtb must be < (CONFIG_SYS_INIT_SP_BSS_OFFSET - CONFIG_SYS_MALLOC_F_LEN)/4
# With the Versal defaults (0x180000 - 0x100000)/4 = 128 KiB, the build fails
# "u-boot.dtb is larger than 1 quarter of ...". Raise the init-SP/BSS offset so
# the early stack sits higher in DRAM, giving the embedded DTB ~512 KiB of
# headroom (3145728 - 0x100000)/4 = 512 KiB. Pure early-init memory layout;
# does not change runtime behaviour.
#
# NOTE: SYS_INIT_SP_BSS_OFFSET is an *int* Kconfig symbol (arch/arm/Kconfig),
# so the value MUST be decimal — a hex "0x..." is rejected and kconfig falls
# back to the 524288 default (which is smaller and makes the check fail harder).
# 3145728 == 0x300000.
CONFIG_SYS_INIT_SP_BSS_OFFSET=3145728
